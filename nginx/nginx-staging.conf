# Trans/Act Journal — Nginx location blocks for STAGING
# Served at: https://misc.lmta.lt/journal
#
# This is NOT a standalone server config. Add these location blocks
# inside the existing HTTPS server block for misc.lmta.lt.
#
# How the subpath proxy works:
#   Nginx receives:  GET /journal/articles/
#   proxy_pass (with trailing slash) strips /journal, forwards: GET /articles/
#   Django sees /articles/ — matches URL patterns normally.
#   FORCE_SCRIPT_NAME='/journal' makes Django generate URLs like /journal/articles/
#   so all links, redirects, and form actions are correct in the browser.
#
# ─────────────────────────────────────────────────────────────────────────────
# PASTE THESE BLOCKS inside your existing misc.lmta.lt server { ... } block:
# ─────────────────────────────────────────────────────────────────────────────

    # Static files — served directly by Nginx (collected at deploy time)
    location /journal/static/ {
        alias /opt/transact-staging/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — uploaded manuscripts, images, audio, video
    location /journal/media/ {
        alias /opt/transact-staging/media/;
        expires 7d;
    }

    # Django application — Nginx strips the /journal prefix before forwarding.
    # The trailing slash in proxy_pass is what does the prefix stripping.
    location /journal/ {
        proxy_pass http://127.0.0.1:5003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 500M;
    }

# ─────────────────────────────────────────────────────────────────────────────
# After adding these blocks, reload Nginx:
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────
