# Trans/Act Journal — Nginx config for PRODUCTION (bare-metal)
# Domain: https://journal.lmta.lt
# Deploy: sudo cp nginx/nginx-production.conf /etc/nginx/sites-available/transact
#         sudo ln -sf /etc/nginx/sites-available/transact /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

upstream django_prod {
    server 127.0.0.1:5002;
}

server {
    listen 80;
    server_name journal.lmta.lt www.journal.lmta.lt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name journal.lmta.lt www.journal.lmta.lt;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/journal.lmta.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/journal.lmta.lt/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Static files (served directly by Nginx after collectstatic)
    location /static/ {
        alias /opt/transact/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded manuscripts, images, audio, video)
    location /media/ {
        alias /opt/transact/media/;
        expires 7d;
    }

    # Django application
    location / {
        proxy_pass http://django_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 500M;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "same-origin";
}
