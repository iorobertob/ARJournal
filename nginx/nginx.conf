# Trans/Act Journal — Nginx production config
# Place this in /etc/nginx/sites-available/transact and symlink to sites-enabled/

upstream django {
    server 127.0.0.1:5002;
}

server {
    listen 80;
    server_name trans-act-journal.org www.trans-act-journal.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trans-act-journal.org www.trans-act-journal.org;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/trans-act-journal.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trans-act-journal.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Static files (served directly by Nginx)
    location /static/ {
        alias /opt/transact/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded content — local storage)
    location /media/ {
        alias /opt/transact/media/;
        expires 7d;
        # Restrict direct access to private assets if needed
    }

    # Django application
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 500M;  # allow large media uploads
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "same-origin";
}
