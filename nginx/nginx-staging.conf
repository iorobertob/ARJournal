# Trans/Act Journal — Nginx location blocks for STAGING
# Served at: https://misc.lmta.lt/ARJournal
#
# This is NOT a standalone server config. Paste these location blocks
# inside the existing HTTPS server block for misc.lmta.lt.
#
# Replace /ARJournal with whatever SCRIPT_NAME you set in .env if different.
# Replace /var/www/ARJournal with the actual path where the repo is cloned.
#
# How the subpath proxy works:
#   Nginx receives:  GET /ARJournal/articles/
#   proxy_pass (trailing slash) strips the prefix, forwards: GET /articles/
#   Django sees /articles/ — matches URL patterns normally.
#   FORCE_SCRIPT_NAME='/ARJournal' makes Django generate URLs with the prefix
#   so all links, redirects, and form actions resolve correctly in the browser.
#
# ─────────────────────────────────────────────────────────────────────────────
# PASTE THESE BLOCKS inside your existing  server { ... }  block for misc.lmta.lt
# ─────────────────────────────────────────────────────────────────────────────

    # Static files — served directly by Nginx (populated by collectstatic)
    # ^~ tells Nginx: if this prefix matches, skip ALL regex location checks.
    # Without it the catch-all  location ~* \.(css|js|png|...)$  block wins
    # over prefix blocks and sends static files to the wrong root → 404.
    location ^~ /ARJournal/static/ {
        alias /var/www/ARJournal/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — uploaded manuscripts, images, audio, video
    location ^~ /ARJournal/media/ {
        alias /var/www/ARJournal/media/;
        expires 7d;
    }

    # Django application
    # The trailing slash in proxy_pass strips the /ARJournal prefix before
    # forwarding to Gunicorn. Django URL patterns match the remaining path.
    location /ARJournal/ {
        proxy_pass http://127.0.0.1:5003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 500M;
    }

# ─────────────────────────────────────────────────────────────────────────────
# After pasting, reload Nginx:
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────
